<!doctype html>
<html lang="sk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dialóg predmetov</title>

  <link rel="stylesheet" href="style.css?v=4">
</head>

<body>

<main class="wrap">

  <header class="head">
    <h1>🎭 Dialóg predmetov: Bakalarska praca</h1>

    <p class="sub">
      Online aj offline dialóg predmetov cez Firebase.
    </p>
  </header>

  <section class="grid">

    <div class="card">

      <h3>🌐 Online miestnosť</h3>

      <div class="row">

        <input
          id="roomId"
          placeholder="Room ID"
        >

        <button
          id="connectRoom"
          class="btn solid"
        >
          Pripojiť
        </button>

        <button
          id="offlineMode"
          class="btn ghost"
        >
          Offline
        </button>

      </div>

      <p
        class="muted"
        id="onlineStatus"
      >
        Offline režim
      </p>

    </div>

    <div class="card">

      <h3>1) Téma a predmety</h3>

      <div class="row">

        <input
          id="tema"
          placeholder="Téma"
        >

        <button
          id="temaRnd"
          class="btn"
        >
          🎲
        </button>

      </div>

      <div class="row">

        <input
          id="objInput"
          placeholder="Nový predmet / účastník"
        >

        <button
          id="participantRnd"
          class="btn"
        >
          🎲
        </button>

        <button
          id="addParticipant"
          class="btn"
        >
          ➕ Pridať
        </button>

      </div>

      <div
        id="participants"
        class="participants"
      ></div>

      <div class="pillboard">

        <div class="pill">
          <span class="k">Téma</span>

          <span
            id="temaOut"
            class="v"
          >
            —
          </span>
        </div>

        <div class="pill">
          <span class="k">Účastníci</span>

          <span
            id="participantsOut"
            class="v"
          >
            —
          </span>
        </div>

      </div>

    </div>

    <div class="card editor-card">

      <h3>2) Dialóg</h3>

      <div class="speaker">

        <span class="muted">
          Na rade:
        </span>

        <b id="whoNow">—</b>

      </div>

      <div class="row">

        <textarea
          id="line"
          rows="3"
          placeholder="Napíš repliku..."
        ></textarea>

      </div>

      <div class="row controls">

        <button
          id="addLine"
          class="btn"
        >
          ➕ Pridať repliku
        </button>

        <button
          id="switch"
          class="btn"
        >
          ↔️ Ďalší
        </button>

        <button
          id="clearAll"
          class="btn ghost"
        >
          🧹 Vyčistiť
        </button>

        <button
          id="download"
          class="btn solid"
        >
          ⬇️ TXT
        </button>

      </div>

      <div
        id="log"
        class="log"
      ></div>

    </div>

  </section>

</main>

<script
  type="module"
  src="script.js?v=4"
></script>

</body>
</html>
