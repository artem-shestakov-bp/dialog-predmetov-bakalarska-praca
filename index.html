<!doctype html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dialóg predmetov Online</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🎭 Dialóg predmetov</h1>

  <div class="card">

    <h2>🌐 Room</h2>

    <div class="row">
      <input id="roomId" placeholder="Room ID">
      <button id="connectRoom">Connect</button>
    </div>

  </div>

  <div class="card">

    <h2>👥 Účastníci</h2>

    <div id="participants"></div>

    <button id="addParticipant">
      ➕ Pridať účastníka
    </button>

  </div>

  <div class="card">

    <h2>💬 Dialóg</h2>

    <textarea
      id="line"
      placeholder="Napíš správu..."
    ></textarea>

    <button id="addLine">
      ➕ Poslať
    </button>

    <div id="log"></div>

  </div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
